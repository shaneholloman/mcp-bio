name: CI

on:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache protoc
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/protoc
          key: protoc-${{ runner.os }}-${{ runner.arch }}-v28.3

      - uses: arduino/setup-protoc@v3
        continue-on-error: true
        with:
          version: "28.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-version-sync.sh

  climb-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-no-climb-tracked.sh

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache protoc
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/protoc
          key: protoc-${{ runner.os }}-${{ runner.arch }}-v28.3

      - uses: arduino/setup-protoc@v3
        continue-on-error: true
        with:
          version: "28.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install mustmatch CLI
        run: |
          uv tool install mustmatch
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mustmatch" --version

      - run: cargo build --release --locked
      - run: uv sync --extra dev --no-install-project
      - run: uv run --no-sync pytest tests/ -v --mcp-cmd "./target/release/biomcp serve"
      - run: uv run --no-sync mkdocs build --strict

  # Stable PR-blocking executable spec gate. Volatile live-network specs
  # stay out of this routine lane and run only through make verify.
  spec-stable:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache protoc
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/protoc
          key: protoc-${{ runner.os }}-${{ runner.arch }}-v28.3

      - uses: arduino/setup-protoc@v3
        continue-on-error: true
        with:
          version: "28.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install mustmatch CLI
        run: |
          uv tool install mustmatch
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/mustmatch" --version

      - name: Compute spec cache metadata
        id: spec-cache-meta
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          cargo = tomllib.loads(Path("Cargo.toml").read_text(encoding="utf-8"))
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"biomcp-version={cargo['package']['version']}\n")
              handle.write("spec-cache-schema-version=1\n")
          PY

      - name: Restore spec cache
        id: spec-cache
        uses: actions/cache@v4
        with:
          path: .cache/biomcp-specs/
          key: >-
            spec-http-${{ runner.os }}-${{ steps.spec-cache-meta.outputs.biomcp-version }}-${{ steps.spec-cache-meta.outputs.spec-cache-schema-version }}

      - name: Mark warm cache hit
        if: steps.spec-cache.outputs.cache-hit == 'true'
        run: echo "BIOMCP_SPEC_CACHE_HIT=1" >> "$GITHUB_ENV"

      # Build the release binary first so make spec exercises target/release/biomcp,
      # not a stale editable install from .venv/bin.
      - run: cargo build --release --locked
      - run: make spec-pr
