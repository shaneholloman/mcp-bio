[advisories]
ignore = [
  { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 is still a transitive dependency of the http-cache/http-cache-reqwest stack BioMCP uses for managed HTTP caching; this ticket only adds the repo gate and patches rustls-webpki." },
  { id = "RUSTSEC-2025-0057", reason = "fxhash 0.2.1 remains a transitive dependency under readability-rust -> scraper -> selectors; no safe replacement lands in this ticket." },
  { id = "RUSTSEC-2024-0384", reason = "instant 0.1.13 is still pulled in transitively through reqwest-retry's parking_lot/wasm-timer stack; this ticket does not replace that retry chain." },
  { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile 2.2.0 is still brought in transitively by tonic 0.12.3; replacing tonic's PEM reader is outside this ticket." },
]
unmaintained = "all"
unsound = "all"
unused-ignored-advisory = "deny"

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
]

[[licenses.exceptions]]
name = "constant_time_eq"
allow = ["CC0-1.0"]

