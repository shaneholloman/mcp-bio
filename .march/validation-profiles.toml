# Validation profiles for March build flow.
# Each [profile.<name>] entry maps a named gate to the shell command that runs it.
# The "# observed" comment above each profile records the most recent measured
# wall-clock timing so the CI/CD team can set appropriate timeouts.
#
# Timings measured on beelink (AMD Ryzen 7 5700U, 16 GB RAM, NVMe SSD, 2026-04-18).

# observed cargo check --all-targets ~25s cold / ~2s warm (beelink 2026-04-18)
[profile.preflight]
command = "cargo check --all-targets"

# observed cargo check --all-targets ~25s cold / ~2s warm (beelink 2026-04-18)
[profile.baseline]
command = "cargo check --all-targets"

# observed cargo test --lib ~43s + cargo clippy ~5s = ~48s (beelink 2026-04-18)
[profile.focused]
command = "cargo test --lib && cargo clippy --lib --tests -- -D warnings"

# observed make check ~55s + make spec-pr ~3m30s = ~4m30s (beelink 2026-04-18)
[profile.full-blocking]
command = "make check && make spec-pr"

# observed make check ~55s + make spec-pr ~3m30s + make test-contracts ~2m = ~6m30s (beelink 2026-04-18)
[profile.full-contracts]
command = "make check && make spec-pr && make test-contracts"
